# 模型接入配置

# 当前按百炼 OpenAI 兼容接口接入
provider: bailian

# 接口模式
endpoint_mode: openai_compatible

# 百炼兼容接口地址
base_url: https://dashscope.aliyuncs.com/compatible-mode/v1

# 从环境变量读取 API Key
api_key_env: "PATCHWEAVER_BAILIAN_API_KEY"

# 禁止在仓库中写入明文 Key；本地运行只通过 api_key_env 注入
api_key: ""

# 统一采用单主模型拓扑
topology: single_primary_with_optional_helpers

# 主链默认模型
default_model: qwen-plus-2025-07-28

# 本地开发调试口径
development_model: qwen-plus-2025-07-28

# 正式展示与交付口径
delivery_model: qwen-plus-2025-07-28

# 主模型回退档位
fallback_model: qwen-plus-2025-07-28

# 可选辅助模型
helper_models:
  code_assistant: qwen-coder-turbo-0919
  vision: qwen-vl-plus-2025-05-07
  log_summary: qwen-plus-2025-07-28

# 辅助模型使用边界
helper_notes:
  code_assistant: 用于草拟局部改写提示、模板和代码片段，不直接决定最终放行结果。
  vision: 用于截图识别、页面检查和演示材料辅助场景。
  log_summary: 用于长日志压缩、失败解释和材料摘要，不直接替代构建判定。

# 模型交互记录模式，off=关闭，basic=记录成本与摘要，full=额外保留完整提示词和原始响应
interaction_record_mode: full

# 模型交互全局 JSONL 日志路径，按仓库根目录解析
interaction_jsonl_path: data/logs/model_interactions.jsonl

# 对外材料统一口径
execution_boundaries:
  - 模型负责语义分析、草拟和解释，最终执行判定仍由规则、原语、Recipe、构建和验证链负责。
  - 不采用多模型协同主执行链，不通过多模型投票决定是否放行构建或验证。
  - 辅助模型只用于解释增强、视觉辅助和摘要压缩，不直接负责最终 patch 定稿。
