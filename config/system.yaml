# 全局基础配置

# 工作区根目录
# 相对路径默认按源码根目录展开，例如 <project_root> -> <project_root>/workspaces
workspace_root: workspaces

# SQLite 数据库路径
database_path: data/patchweaver.db

# 默认目标内核版本
default_kernel: 6.6.102-5.2.an23.x86_64

# 单个补丁最大尝试次数
max_attempts: 5

# 只读阶段的最大并发数
parallel_read_limit: 3

# 写入独占粒度，首版按任务级串行
write_lock_scope: task

# Trace 记录模式，首版保留完整回放材料
trace_mode: full

# manifest 归档目录
manifest_dir: data/manifests

# 报告输出格式
report_formats:
  - json
  - md

# Web/API 默认监听地址
api_host: 0.0.0.0

# Web/API 默认监听端口
api_port: 18084

# 验证机上的 systemd 服务名
api_service_name: patchweaver-web

# 初始化或部署完成后，默认安装并启用 API 自启动服务
auto_install_api_service: true
