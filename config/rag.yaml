# RAG vector retrieval configuration

enabled: true

# Milvus backend
vector_backend: milvus
milvus_uri: "http://127.0.0.1:19530"
milvus_token: ""
milvus_database: "default"
milvus_collection: "patchweaver_cve_chunks"
metric_type: "COSINE"
search_limit: 6

# Embedding configuration
embedding_provider: "bailian"
embedding_base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
embedding_api_key_env: "PATCHWEAVER_BAILIAN_API_KEY"
embedding_api_key: ""
embedding_model: "text-embedding-v3"
embedding_dimensions: 1024
embedding_timeout_sec: 60

# Optional rerank refinement
rerank_enabled: true
rerank_provider: "bailian"
rerank_base_url: "https://dashscope.aliyuncs.com/compatible-api/v1"
rerank_api_key_env: "PATCHWEAVER_BAILIAN_API_KEY"
rerank_api_key: ""
rerank_model: "qwen3-rerank"
rerank_timeout_sec: 60
rerank_candidate_pool: 12
rerank_top_n: 6

# Default corpus
corpus_jsonl_path: "rag_corpus_batch200/chunks/all_chunks.jsonl"
import_batch_size: 32

# Experience retrieval fallback
# 这层读取已确认正向池和 kpatch constraint 专项池，供 Agent 在构建失败或规划阶段召回历史经验。
experience_enabled: true
experience_fixture_paths:
  - "evaluations/fixtures/challenge_positive_pool_confirmed_v0426.json"
  - "evaluations/fixtures/challenge_kpatch_constraint_pool_v0427.json"
experience_limit: 4
