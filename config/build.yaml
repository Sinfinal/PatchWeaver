# 构建配置

# 构建后端固定为 local，表示在当前运行 PatchWeaver 的机器上直接构建。
# 日常开发可在开发机完成，联调与验收前再把代码同步到验证机本地运行。
build_backend: local

# 优先指向未修复源码树。
# 验收环境若同时保留干净树和已修复树，构建阶段会先从这里选。
clean_kernel_src_dir: ""

# 与目标发行版内核完全一致的未修复 vendor source baseline。
# 只有这类源码树才适合进入正向成功率验收。
vendor_kernel_src_dir: ""

# 按 CVE stable 修复提交父版本准备出的未修复源码树。
# 该目录用于 patch_apply_failed/context_mismatch 时做源码状态对齐。
stable_kernel_src_dir: ""

# linux-stable git 仓库路径。
# prepare-stable-baseline 会从这里按 stable_source_baseline_ref checkout 未修复基线。
stable_source_git_dir: ""

# stable baseline worktree 缓存根目录。
# 验证机根分区较小，stable baseline 快照必须落到 /home 大分区。
stable_source_cache_dir: /home/patchweaver/stable-baselines

# 若验证机已经准备出完整的 vendor source tree，可在这里登记。
# 这棵树通常来自 Anolis 对应 kernel source SRPM，比 /opt/kernel-src 更适合承接真实编译。
prepared_kernel_src_dir: ""

# 目标内核源码目录
kernel_src_dir: /opt/kernel-src

# kernel-devel 目录
kernel_devel_dir: /usr/src/kernels/6.6.102-5.2.an23.x86_64

# 若当前 kernel_src_dir 已经打过补丁，可把已修复源码树单独登记在这里。
patched_kernel_src_dir: ""

# 源码树选择顺序。
# 一般优先 clean -> prepared full source -> 默认源码树 -> kernel-devel -> 已修复树。
build_source_priority:
  - clean_kernel_src_dir
  - vendor_kernel_src_dir
  - prepared_kernel_src_dir
  - kernel_src_dir
  - stable_kernel_src_dir
  - kernel_devel_dir
  - patched_kernel_src_dir

# 首选源码树命中 target_already_patched 时，是否自动切换到下一棵树重试。
auto_switch_source_tree: true

# 当命中 target_already_patched 且当前轮需要继续尝试构建时，
# 是否在 attempt 目录下自动准备一棵反向补丁树。
auto_reverse_source_tree: true

# 反向补丁树只作为本轮构建临时输入，构建结束后清理，避免多 CVE 测试堆满磁盘。
cleanup_generated_source_tree: true

# Anolis 6.6 验证内核使用 -fpatchable-function-entry=16,16。
# 当前 kpatch-build/create-diff-object 对该布局会把函数入口识别到 offset 16。
# 反向源码树构建前把第二参数归零，让本轮热补丁模块按 kpatch 可识别的入口布局生成。
normalize_x86_function_padding_for_kpatch: true

# 是否根据补丁触达文件自动收窄 kpatch-build 的构建目标。
# 模块补丁会尽量落到 vmlinux + 受影响模块，已预热源码树时可进一步缩到单模块。
auto_build_targets: true

# 模块目标构建时，按 modinfo depends 自动补齐依赖模块目标，减少 modpost 未解析符号。
auto_expand_module_dependencies: true

# Anolis 6.6 kpatch-build 会把 .rela.call_sites 元数据变化归为 unsupported section change。
# 启用后会给 create-diff-object 安装受控 wrapper，在差异对象比较前剥离 call_sites 元数据。
enable_call_sites_section_compat: true
create_diff_object_path: /usr/libexec/kpatch/create-diff-object

# vmlinux 符号文件路径
vmlinux_path: /usr/lib/debug/lib/modules/6.6.102-5.2.an23.x86_64/vmlinux

# kpatch-build 命令
kpatch_build_cmd: kpatch-build

# 单次构建超时时间（秒）
build_timeout_sec: 3600
