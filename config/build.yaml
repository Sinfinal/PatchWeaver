# 构建配置

# 构建后端固定为 local，表示在当前运行 PatchWeaver 的机器上直接构建。
# 日常开发可在开发机完成，联调与验收前再把代码同步到验证机本地运行。
build_backend: local

# 优先指向未修复源码树。
# 验收环境若同时保留干净树和已修复树，构建阶段会先从这里选。
clean_kernel_src_dir: ""

# 若验证机已经准备出完整的 vendor source tree，可在这里登记。
# 这棵树通常来自 Anolis 对应 kernel source SRPM，比 /opt/kernel-src 更适合承接真实编译。
prepared_kernel_src_dir: ""

# 目标内核源码目录
kernel_src_dir: /opt/kernel-src

# kernel-devel 目录
kernel_devel_dir: /usr/src/kernels/6.6.102-5.2.an23.x86_64

# 若当前 kernel_src_dir 已经打过补丁，可把已修复源码树单独登记在这里。
patched_kernel_src_dir: ""

# 源码树选择顺序。
# 一般优先 clean -> prepared full source -> 默认源码树 -> kernel-devel -> 已修复树。
build_source_priority:
  - clean_kernel_src_dir
  - prepared_kernel_src_dir
  - kernel_src_dir
  - kernel_devel_dir
  - patched_kernel_src_dir

# 首选源码树命中 target_already_patched 时，是否自动切换到下一棵树重试。
auto_switch_source_tree: true

# 当命中 target_already_patched 且当前轮需要继续尝试构建时，
# 是否在 attempt 目录下自动准备一棵反向补丁树。
auto_reverse_source_tree: true

# 是否根据补丁触达文件自动收窄 kpatch-build 的构建目标。
# 模块补丁会尽量落到 vmlinux + 受影响模块，已预热源码树时可进一步缩到单模块。
auto_build_targets: true

# vmlinux 符号文件路径
vmlinux_path: /usr/lib/debug/lib/modules/6.6.102-5.2.an23.x86_64/vmlinux

# kpatch-build 命令
kpatch_build_cmd: kpatch-build

# 单次构建超时时间（秒）
build_timeout_sec: 3600
