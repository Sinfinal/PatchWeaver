services:
  patchweaver-api:
    build:
      context: ../..
      dockerfile: build/patchweaver/Dockerfile
      args:
        PYTHON_BASE_IMAGE: "${PATCHWEAVER_PYTHON_BASE_IMAGE:-python:3.11-slim}"
    image: patchweaver:local
    container_name: patchweaver-api
    privileged: true
    ports:
      - "18084:18084"
    environment:
      PATCHWEAVER_PROFILE: "${PATCHWEAVER_PROFILE:-demo}"
      PATCHWEAVER_BAILIAN_API_KEY: "${PATCHWEAVER_BAILIAN_API_KEY:-}"
      PATCHWEAVER_HOST_ROOT: "${PATCHWEAVER_DOCKER_ROOT:-/usr/local/patchweaver}"
      PATCHWEAVER_KERNEL_RELEASE: "${PATCHWEAVER_KERNEL_RELEASE:-6.6.102-5.2.an23.x86_64}"
      PATCHWEAVER_KPATCH_BUILD_EXTRA_ARGS: "${PATCHWEAVER_KPATCH_BUILD_EXTRA_ARGS:---skip-compiler-check}"
      PATCHWEAVER_KPATCH_BUILD_ENV: "${PATCHWEAVER_KPATCH_BUILD_ENV:-HOSTLDFLAGS=-no-pie}"
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"
    volumes:
      - ${PATCHWEAVER_DOCKER_ROOT:-/usr/local/patchweaver}/data:/app/data
      - ${PATCHWEAVER_DOCKER_ROOT:-/usr/local/patchweaver}/workspaces:/app/workspaces
      - ${PATCHWEAVER_DOCKER_ROOT:-/usr/local/patchweaver}/docs/submission:/app/docs/submission
      - ${PATCHWEAVER_DOCKER_ROOT:-/usr/local/patchweaver}/config:/app/config:ro
      - ${PATCHWEAVER_DOCKER_ROOT:-/usr/local/patchweaver}/evaluations:/app/evaluations:ro
      - ${PATCHWEAVER_DOCKER_ROOT:-/usr/local/patchweaver}/host/lib/modules:/lib/modules:ro
      - ${PATCHWEAVER_DOCKER_ROOT:-/usr/local/patchweaver}/host/usr/include:/usr/include:ro
      - ${PATCHWEAVER_DOCKER_ROOT:-/usr/local/patchweaver}/host/usr/src/kernels:/usr/src/kernels:ro
      - ${PATCHWEAVER_DOCKER_ROOT:-/usr/local/patchweaver}/host/usr/lib/debug:/usr/lib/debug:ro
      - ${PATCHWEAVER_DOCKER_ROOT:-/usr/local/patchweaver}/host/opt/kernel-src:/opt/kernel-src:ro
      - ${PATCHWEAVER_DOCKER_ROOT:-/usr/local/patchweaver}/host/home/patchweaver/kernel-src-prepared:/home/patchweaver/kernel-src-prepared:ro
      - ${PATCHWEAVER_DOCKER_ROOT:-/usr/local/patchweaver}/host/usr/bin/kpatch-build:/usr/bin/kpatch-build:ro
      - ${PATCHWEAVER_DOCKER_ROOT:-/usr/local/patchweaver}/host/usr/libexec/kpatch:/usr/libexec/kpatch
      - ${PATCHWEAVER_DOCKER_ROOT:-/usr/local/patchweaver}/host/usr/share/kpatch:/usr/share/kpatch:ro
    command: ["patchweaver", "serve-api", "--host", "0.0.0.0", "--port", "18084", "--foreground"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:18084/healthz', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  patchweaver-web:
    build:
      context: ../..
      dockerfile: build/patchweaver/web.Dockerfile
      args:
        NODE_BASE_IMAGE: "${PATCHWEAVER_NODE_BASE_IMAGE:-node:20-alpine}"
        NGINX_BASE_IMAGE: "${PATCHWEAVER_NGINX_BASE_IMAGE:-nginx:1.27-alpine}"
    image: patchweaver-web:local
    container_name: patchweaver-web
    depends_on:
      patchweaver-api:
        condition: service_healthy
    ports:
      - "18085:18085"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:18085/console/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  patchweaver-validation:
    profiles:
      - validation
      -
    build:
      context: ../..
      dockerfile: build/patchweaver/Dockerfile
      args:
        PYTHON_BASE_IMAGE: "${PATCHWEAVER_PYTHON_BASE_IMAGE:-python:3.11-slim}"
    image: patchweaver:local
    container_name: patchweaver-validation
    privileged: true
    network_mode: host
    environment:
      PATCHWEAVER_PROFILE: "${PATCHWEAVER_PROFILE:-full}"
      PATCHWEAVER_BAILIAN_API_KEY: "${PATCHWEAVER_BAILIAN_API_KEY:-}"
      PATCHWEAVER_KERNEL_RELEASE: "${PATCHWEAVER_KERNEL_RELEASE:-6.6.102-5.2.an23.x86_64}"
      PATCHWEAVER_KPATCH_BUILD_EXTRA_ARGS: "${PATCHWEAVER_KPATCH_BUILD_EXTRA_ARGS:---skip-compiler-check}"
      PATCHWEAVER_KPATCH_BUILD_ENV: "${PATCHWEAVER_KPATCH_BUILD_ENV:-HOSTLDFLAGS=-no-pie}"
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"
    volumes:
      - ${PATCHWEAVER_DOCKER_ROOT:-/usr/local/patchweaver}/data:/app/data
      - ${PATCHWEAVER_DOCKER_ROOT:-/usr/local/patchweaver}/workspaces:/app/workspaces
      - ${PATCHWEAVER_DOCKER_ROOT:-/usr/local/patchweaver}/docs/submission:/app/docs/submission
      - ${PATCHWEAVER_DOCKER_ROOT:-/usr/local/patchweaver}/config:/app/config
      - ${PATCHWEAVER_DOCKER_ROOT:-/usr/local/patchweaver}/evaluations:/app/evaluations:ro
      - ${PATCHWEAVER_DOCKER_ROOT:-/usr/local/patchweaver}/host/lib/modules:/lib/modules:ro
      - ${PATCHWEAVER_DOCKER_ROOT:-/usr/local/patchweaver}/host/usr/include:/usr/include:ro
      - ${PATCHWEAVER_DOCKER_ROOT:-/usr/local/patchweaver}/host/usr/src/kernels:/usr/src/kernels:ro
      - ${PATCHWEAVER_DOCKER_ROOT:-/usr/local/patchweaver}/host/usr/lib/debug:/usr/lib/debug:ro
      - ${PATCHWEAVER_DOCKER_ROOT:-/usr/local/patchweaver}/host/opt/kernel-src:/opt/kernel-src
    command: ["patchweaver", "doctor", "--json"]
